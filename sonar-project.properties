sonar.organization=nimashag
sonar.projectKey=nimashag_hungerjet-devops-microservice
sonar.projectName=hungerjet-devops-microservice
sonar.sourceEncoding=UTF-8

# Scan source folders across all services
sonar.sources=orders-service/src,restaurants-service/src,users-service/src

# Exclusions for generated/build/dependency content
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx

# Test source folders and patterns
sonar.testSources=orders-service/src,restaurants-service/src,users-service/src
sonar.test.inclusions=**/__tests__/**,**/*.test.ts,**/*.spec.ts

# LCOV coverage reports generated by Jest (relative to project root)
sonar.javascript.lcov.reportPaths=orders-service/coverage/lcov.info,restaurants-service/coverage/lcov.info,users-service/coverage/lcov.info
