name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  DOCKER_REGISTRY: docker.io

jobs:
  # Build and test backend services
  build-backend:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: 
          - users-service
          - restaurants-service
          - orders-service
          - delivery-service
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      
      - name: Install dependencies
        working-directory: ./${{ matrix.service }}
        run: npm ci
      
      - name: Lint code (if configured)
        working-directory: ./${{ matrix.service }}
        run: npm run lint --if-present
        continue-on-error: true
      
      - name: Run tests
        working-directory: ./${{ matrix.service }}
        run: npm test --if-present
        continue-on-error: true
      
      - name: Build TypeScript
        working-directory: ./${{ matrix.service }}
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-build
          path: ${{ matrix.service }}/dist
          retention-days: 5

  # Build and test frontend service
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend-service/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend-service
        run: npm ci
      
      - name: Build frontend
        working-directory: ./frontend-service
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-service-build
          path: frontend-service/dist
          retention-days: 5

  # Build and push Docker images
  docker-build-push:
    name: Docker Build & Push
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    strategy:
      matrix:
        service:
          - users-service
          - restaurants-service
          - orders-service
          - delivery-service
          - frontend-service
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:buildcache,mode=max
      
      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.docker_build.outputs.digest }}"

  # Security scanning (prepare for SonarCloud)
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarCloud
      
      - name: Run dependency check
        run: |
          echo "Dependency vulnerability check"
          for service in users-service restaurants-service orders-service delivery-service; do
            echo "Checking $service..."
            cd $service
            npm audit --audit-level=moderate || true
            cd ..
          done
      
      # Placeholder for SonarCloud (will be activated in Phase 3)
      - name: SonarCloud Scan (Ready for Phase 3)
        run: |
          echo "SonarCloud will be configured in Phase 3"
          echo "Repository: https://github.com/nimashag/hungerjet-devops-microservice"
