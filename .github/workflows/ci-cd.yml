name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop, for-live-deployment ]
  pull_request:
    branches: [ main, master ]

env:
  DOCKER_REGISTRY: docker.io

jobs:
  # Build and test backend services
  build-backend:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - users-service
          - restaurants-service
          - orders-service
          - delivery-service

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '18'

      - name: Cache dependencies
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c
        with:
          path: ${{ matrix.service }}/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles(format('{0}/package-lock.json', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: ./${{ matrix.service }}
        run: npm ci --ignore-scripts

      - name: Restore trusted native modules
        if: matrix.service == 'users-service'
        working-directory: ./${{ matrix.service }}
        run: npm rebuild bcrypt --foreground-scripts

      - name: Lint code (if configured)
        working-directory: ./${{ matrix.service }}
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run tests
        working-directory: ./${{ matrix.service }}
        run: npm run test:ci --if-present
        continue-on-error: false

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage/lcov.info
          if-no-files-found: ignore
          retention-days: 5

      - name: Build TypeScript
        working-directory: ./${{ matrix.service }}
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.service }}-build
          path: ${{ matrix.service }}/dist
          retention-days: 5

  # Build and test frontend service
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '18'

      - name: Cache dependencies
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c
        with:
          path: frontend-service/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend-service/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: ./frontend-service
        run: npm ci --ignore-scripts

      - name: Restore trusted frontend build module
        working-directory: ./frontend-service
        run: npm rebuild esbuild --foreground-scripts

      - name: Build frontend
        working-directory: ./frontend-service
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: frontend-service-build
          path: frontend-service/dist
          retention-days: 5

  # Build and push Docker images
  docker-build-push:
    name: Docker Build & Push
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/for-live-deployment')

    strategy:
      matrix:
        service:
          - users-service
          - restaurants-service
          - orders-service
          - delivery-service
          - frontend-service

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:buildcache,mode=max

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.docker_build.outputs.digest }}"

  # Security scanning (prepare for SonarCloud)
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Download coverage reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: coverage-*
          merge-multiple: false

      - name: Move coverage files into expected paths
        run: |
          for svc in delivery-service orders-service restaurants-service users-service; do
            mkdir -p "$svc/coverage"
            if [ -f "coverage-$svc/lcov.info" ]; then
              cp "coverage-$svc/lcov.info" "$svc/coverage/lcov.info"
            fi
          done

      - name: Run dependency check
        run: |
          echo "Dependency vulnerability check"
          for service in users-service restaurants-service orders-service delivery-service; do
            echo "Checking $service..."
            cd $service
            npm audit --audit-level=moderate || true
            cd ..
          done

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Deploy to EC2
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [docker-build-push, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/for-live-deployment'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            cd /home/ubuntu/hungerjet
            chmod +x deploy.sh
            ./deploy.sh
