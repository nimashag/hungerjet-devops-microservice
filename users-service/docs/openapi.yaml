openapi: 3.0.3
info:
  title: Users Service API
  version: 1.0.0
  description: Authentication and user management endpoints.
servers:
  - url: http://localhost:3003
    description: Local direct service access
  - url: http://localhost:31000
    description: API gateway (Nginx)
tags:
  - name: Health
  - name: Auth
paths:
  /api/auth/health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Service health payload
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      responses:
        '201':
          description: User created
        '400':
          description: Validation error
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and receive token
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials
  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
        '401':
          description: Unauthorized
  /api/auth/all:
    get:
      tags: [Auth]
      summary: Get all users (appAdmin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User list
        '403':
          description: Forbidden
  /api/auth/{id}:
    get:
      tags: [Auth]
      summary: Get user by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User found
        '404':
          description: User not found
    put:
      tags: [Auth]
      summary: Update user by id (appAdmin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User updated
        '403':
          description: Forbidden
    delete:
      tags: [Auth]
      summary: Delete user by id (appAdmin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deleted
        '403':
          description: Forbidden
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
