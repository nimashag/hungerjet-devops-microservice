openapi: 3.0.3
info:
  title: Users Service API
  version: 1.0.0
  description: Authentication and user management endpoints.
servers:
  - url: http://localhost:3003
    description: Local direct service access
  - url: http://localhost:31000
    description: API gateway (Nginx)
  - url: http://35.154.205.209:31000
    description: AWS deployment (API gateway)
tags:
  - name: Health
  - name: Auth
paths:
  /api/auth/health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Service health payload
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              customer:
                summary: Customer registration
                value:
                  name: John Doe
                  email: john@example.com
                  password: "P@ssw0rd!"
                  role: customer
                  phone: "+94770000000"
                  address: "123 Main St, Colombo"
      responses:
        '201':
          description: User created
        '400':
          description: Validation error
        '409':
          description: User already exists
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and receive token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              login:
                value:
                  email: john@example.com
                  password: "P@ssw0rd!"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
        '404':
          description: User not found
  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
        '401':
          description: Unauthorized
  /api/auth/all:
    get:
      tags: [Auth]
      summary: Get all users (appAdmin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User list
        '403':
          description: Forbidden
  /api/auth/{id}:
    get:
      tags: [Auth]
      summary: Get user by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User found
        '404':
          description: User not found
    put:
      tags: [Auth]
      summary: Update user by id (appAdmin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
            examples:
              approveUser:
                summary: Approve a user
                value:
                  isApproved: true
              updateProfileFields:
                value:
                  name: "John Doe"
                  phone: "+94770000000"
                  role: customer
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUserResponse'
        '403':
          description: Forbidden
        '404':
          description: User not found
    delete:
      tags: [Auth]
      summary: Delete user by id (appAdmin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deleted
        '403':
          description: Forbidden
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      additionalProperties: false
      required: [name, email, password, role]
      properties:
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: "P@ssw0rd!"
        role:
          type: string
          enum: [customer, restaurantAdmin, deliveryPersonnel, appAdmin]
          example: customer
        phone:
          type: string
          example: "+94770000000"
        address:
          type: string
          example: "123 Main St, Colombo"
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: "P@ssw0rd!"
    UserPublic:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
        isApproved:
          type: boolean
    LoginResponse:
      type: object
      additionalProperties: false
      required: [token, user]
      properties:
        token:
          type: string
          description: JWT bearer token
        user:
          $ref: '#/components/schemas/UserPublic'
    UpdateUserRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [customer, restaurantAdmin, deliveryPersonnel, appAdmin]
        phone:
          type: string
        address:
          type: string
        isApproved:
          type: boolean
    UpdateUserResponse:
      type: object
      additionalProperties: false
      required: [message, user]
      properties:
        message:
          type: string
          example: User updated successfully
        user:
          type: object
          additionalProperties: true
