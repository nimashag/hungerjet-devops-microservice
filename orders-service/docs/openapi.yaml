openapi: 3.0.3
info:
  title: Orders Service API
  version: 1.0.0
  description: Order lifecycle and payment endpoints.
servers:
  - url: http://localhost:3002
    description: Local direct service access
  - url: http://localhost:31000
    description: API gateway (Nginx)
  - url: http://35.154.205.209:31000
    description: AWS deployment (API gateway)
tags:
  - name: Health
  - name: Orders
  - name: Payments
paths:
  /api/orders/health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Service health payload
  /api/orders:
    post:
      tags: [Orders]
      summary: Create order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            examples:
              basic:
                value:
                  restaurantId: "665f10bd4f4b6f1c0b0a0001"
                  items:
                    - menuItemId: "665f10bd4f4b6f1c0b0a1001"
                      name: "Cheese Burger"
                      quantity: 2
                      price: 8.5
                  deliveryAddress:
                    street: "123 Main St"
                    city: Colombo
                    state: Western
                    zipCode: "00100"
                    country: Sri Lanka
                  totalAmount: 17.0
                  paymentMethod: Stripe
                  specialInstructions: "Leave at the gate"
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
    get:
      tags: [Orders]
      summary: List all orders
      responses:
        '200':
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
  /api/orders/{id}:
    get:
      tags: [Orders]
      summary: Get order by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Not found
    put:
      tags: [Orders]
      summary: Update order
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderRequest'
            examples:
              updateStatus:
                value:
                  status: Confirmed
              updateAddress:
                value:
                  deliveryAddress:
                    street: "456 Lake Rd"
                    city: Colombo
      responses:
        '200':
          description: Order updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
    delete:
      tags: [Orders]
      summary: Delete order
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order deleted
  /api/orders/restaurant/{restaurantId}:
    get:
      tags: [Orders]
      summary: Get orders by restaurant id
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order list for restaurant
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
  /api/orders/{id}/delivery-address:
    patch:
      tags: [Orders]
      summary: Update delivery address
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeliveryAddressRequest'
            examples:
              address:
                value:
                  deliveryAddress:
                    street: "123 Main St"
                    city: Colombo
                    state: Western
                    zipCode: "00100"
                    country: Sri Lanka
      responses:
        '200':
          description: Address updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
  /api/orders/{id}/special-instructions:
    patch:
      tags: [Orders]
      summary: Update special instructions
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSpecialInstructionsRequest'
            examples:
              instructions:
                value:
                  specialInstructions: "Ring the bell"
      responses:
        '200':
          description: Instructions updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
  /api/orders/{id}/mark-paid:
    patch:
      tags: [Payments]
      summary: Mark order as paid
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkPaidRequest'
            examples:
              stripe:
                value:
                  paymentMethod: Stripe
                  transactionId: "pi_3Pxxxxxxxxxxxx"
      responses:
        '200':
          description: Order marked as paid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
  /api/orders/{id}/status:
    patch:
      tags: [Orders]
      summary: Update order status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusRequest'
            examples:
              preparing:
                value:
                  status: Preparing
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
  /api/orders/create-payment-intent:
    post:
      tags: [Payments]
      summary: Create Stripe payment intent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentIntentRequest'
            examples:
              payment:
                value:
                  totalAmount: 17.0
                  items:
                    - name: "Cheese Burger"
                      price: 8.5
      responses:
        '200':
          description: Payment intent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePaymentIntentResponse'
  /api/orders/webhook:
    post:
      tags: [Payments]
      summary: Stripe webhook callback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Webhook handled
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Address:
      type: object
      additionalProperties: false
      required: [city]
      properties:
        street:
          type: string
        city:
          type: string
        state:
          type: string
        zipCode:
          type: string
        country:
          type: string
    OrderItem:
      type: object
      additionalProperties: false
      required: [name, price]
      properties:
        menuItemId:
          type: string
          description: Menu item id (Mongo ObjectId as string)
        name:
          type: string
        quantity:
          type: integer
          minimum: 1
          default: 1
        price:
          type: number
    Order:
      type: object
      additionalProperties: true
      properties:
        _id:
          type: string
        userId:
          type: string
        restaurantId:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        status:
          type: string
          enum: [Pending, Confirmed, Preparing, Waiting for Pickup, Delivered, Cancelled]
        totalAmount:
          type: number
        deliveryAddress:
          $ref: '#/components/schemas/Address'
        paymentStatus:
          type: string
          enum: [Pending, Paid, Failed]
        paymentMethod:
          type: string
          enum: [Stripe]
        specialInstructions:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
    CreateOrderRequest:
      type: object
      additionalProperties: false
      required: [restaurantId, items, deliveryAddress, totalAmount]
      properties:
        restaurantId:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        status:
          type: string
          enum: [Pending, Confirmed, Preparing, Waiting for Pickup, Delivered, Cancelled]
        deliveryAddress:
          $ref: '#/components/schemas/Address'
        totalAmount:
          type: number
        paymentStatus:
          type: string
          enum: [Pending, Paid, Failed]
        paymentMethod:
          type: string
          enum: [Stripe]
        specialInstructions:
          type: string
    UpdateOrderRequest:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        status:
          type: string
          enum: [Pending, Confirmed, Preparing, Waiting for Pickup, Delivered, Cancelled]
        deliveryAddress:
          $ref: '#/components/schemas/Address'
        totalAmount:
          type: number
        paymentStatus:
          type: string
          enum: [Pending, Paid, Failed]
        paymentMethod:
          type: string
          enum: [Stripe]
        specialInstructions:
          type: string
    UpdateDeliveryAddressRequest:
      type: object
      additionalProperties: false
      required: [deliveryAddress]
      properties:
        deliveryAddress:
          $ref: '#/components/schemas/Address'
    UpdateSpecialInstructionsRequest:
      type: object
      additionalProperties: false
      required: [specialInstructions]
      properties:
        specialInstructions:
          type: string
    UpdateOrderStatusRequest:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [Pending, Confirmed, Preparing, Waiting for Pickup, Delivered, Cancelled]
    MarkPaidRequest:
      type: object
      additionalProperties: false
      required: [paymentMethod, transactionId]
      properties:
        paymentMethod:
          type: string
          enum: [Stripe]
        transactionId:
          type: string
    CreatePaymentIntentRequest:
      type: object
      additionalProperties: false
      required: [totalAmount]
      properties:
        totalAmount:
          type: number
        items:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              name:
                type: string
              price:
                type: number
    CreatePaymentIntentResponse:
      type: object
      additionalProperties: false
      required: [clientSecret, items]
      properties:
        clientSecret:
          type: string
        items:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              name:
                type: string
              price:
                type: number
